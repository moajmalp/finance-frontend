<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/flux_icon.png" />
  <link rel="apple-touch-icon" href="/flux_icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FLUX" />
  <link rel="manifest" href="/manifest.json" />
  <title>FLUX - Future Finance</title>
</head>

<body class="antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          for (let registration of registrations) {
            registration.unregister();
            console.log('Successfully unregistered stuck Service Worker on localhost');
          }
          if (window.caches) {
            caches.keys().then(function (names) {
              for (let name of names) caches.delete(name);
            });
          }
          if (registrations.length > 0) window.location.reload();
        });
      } else {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
        });
      }
    }
  </script>
</body>

</html>
